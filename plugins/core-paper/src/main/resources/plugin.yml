name: SMPCore
version: 1.0.0
main: fr.smp.core.SMPCore
api-version: "26.1.2"
description: "Full SMP core — economy, teams, homes, warps, AH, combat tag, logging"
authors: ["SMP Team"]

commands:
  menu:
    description: "Open server selector"
    aliases: [servers, selector]
  spawn:
    description: "Teleport to the hub spawn (transfers to lobby if needed)"
    aliases: [hub, lobby]
  setspawn:
    description: "Set survival spawn"
    permission: smp.admin
  sethubspawn:
    description: "Set hub/lobby spawn"
    permission: smp.admin
  rtp:
    description: "Random teleport (GUI or direct)"
    aliases: [wild]
  wb:
    description: "Worldborder management"
    aliases: [worldborder]
    permission: smp.admin
  tp:
    description: "Teleport instantly to a player (network-wide, admin)"
    permission: smp.admin
  tpa:
    description: "Ask to teleport to a player"
  tpahere:
    description: "Ask a player to teleport to you"
  tpaccept:
    description: "Accept a TPA request"
    aliases: [tpaccept]
  tpdeny:
    description: "Deny a TPA request"
  tpacancel:
    description: "Cancel outgoing TPA requests"
  warp:
    description: "Warp command"
  warps:
    description: "Warps GUI"
  setwarp:
    description: "Create a warp"
    permission: smp.admin
  delwarp:
    description: "Delete a warp"
    permission: smp.admin
  find:
    description: "Find online players (GUI)"
  bal:
    description: "Show balance"
    aliases: [balance, money]
  pay:
    description: "Send money to a player"
  shards:
    description: "Show saphir balance"
    aliases: [saphirs, saphir]
  eco:
    description: "Economy admin (give/take/set)"
    permission: smp.admin
  baltop:
    description: "Top richest players (GUI)"
    aliases: [moneytop, richlist]
  leaderboard:
    description: "Browse all available leaderboards"
    aliases: [lb, tops]
  sell:
    description: "Sell items (hand | all)"
  sellall:
    description: "Vend tout l'inventaire vendable en une commande"
    aliases: [sa]
  worth:
    description: "Affiche la valeur de l'item en main"
    aliases: [valeur, prix]
  shop:
    description: "Open the shop GUI. Admin: /shop on|off|toggle|reload"
  home:
    description: "Teleport to a home"
  homes:
    description: "Homes GUI"
  sethome:
    description: "Set a home at current location"
  delhome:
    description: "Delete a home"
  team:
    description: "Team management"
    aliases: [guild]
  ah:
    description: "Auction House"
    aliases: [auction]
  # keyall:
  #   description: "Keyall countdown"
  end:
    description: "Teleport to the End (players) / Enable-disable (admin)"
  phantom:
    description: "Enable/disable phantom spawning (admin)"
    permission: smp.admin
  heads:
    description: "Open the heads explorer GUI"
  bounty:
    description: "Bounty system — place, list and collect bounties on other players"
    aliases: [bounties, prime]
  waypoints:
    description: "Open the waypoint GUI. Use player <name> or coords <x> <y> <z> to display coordinates."
    aliases: [wp, waypoint]
  msg:
    description: "Send a private message"
    aliases: [message, w, tell, whisper]
  r:
    description: "Reply to the last private message"
    aliases: [reply]
  here:
    description: "Broadcast your current location"
    aliases: [coords, h]
  sit:
    description: "Sit on any solid block; sneak to stand up"
  playtime:
    description: "Show detailed playtime (AFK included) for you or another player"
    aliases: [pt]
  stat:
    description: "Affiche les statistiques détaillées d'un joueur"
    aliases: [stats, statsplayer]
  ping:
    description: "Check network latency for yourself or another player"
  saphir:
    description: "Show detailed saphir for you or another player"
    aliases: [saphirs]
  invsee:
    description: "Inspect another player's inventory"
    permission: smp.admin
  vanish:
    description: "Toggle vanish mode with movement safeguards"
    aliases: [v]
    permission: smp.vanish
  fullbright:
    description: "Toggle permanent client-side night vision"
    aliases: [fb]
    permission: smp.fullbright
  kick:
    description: "Kick a player with optional reason"
    permission: smp.moderation
  ban:
    description: "Ban a player. Duration format: 1d2h30m (empty = permanent)"
    permission: smp.moderation
  unban:
    description: "Unban a player"
    permission: smp.moderation
  banlist:
    description: "List all active bans (GUI)"
    permission: smp.moderation
    aliases: [bans, bl]
  mute:
    description: "Mute a player. Duration format: 1d2h30m (empty = permanent)"
    permission: smp.moderation
  unmute:
    description: "Unmute a player"
    permission: smp.moderation
  sb:
    description: "Toggle scoreboard"
    aliases: [scoreboard]
  spawner:
    description: "Gérer les spawners custom (give/types)"
    permission: smp.admin
  voidstone:
    description: "Administer voidstones (give/materials)"
    aliases: [vstone]
    permission: smp.admin
  ce:
    description: "Custom enchants admin — list, book, apply, clear"
    aliases: [customench, customenchant]
    permission: smp.admin
  perm:
    description: "Manage cross-server permissions (groups / users)"
    aliases: [permission, perms, lp]
    permission: smp.perm.manage
  op:
    description: "Promote a player to admin (cross-server)"
    permission: smp.op
  deop:
    description: "Remove admin from a player (cross-server)"
    permission: smp.op
  online:
    description: "List all players across the network (OP)"
    aliases: [netlist, nlist, gplayers]
    permission: smp.admin
  skin:
    description: "Manage cracked skins: info / reset / random / take"
    aliases: [skins]
    permission: smp.admin
  gate:
    description: "Portcullis / animated gates — create, list, delete, force open/close"
    aliases: [gates, portcullis]
    permission: smp.admin
  login:
    description: "Authentifie-toi avec ton mot de passe"
    aliases: [l, log]
  register:
    description: "Crée ton compte avec un mot de passe"
    aliases: [reg, registrer]
  changepassword:
    description: "Change ton mot de passe"
    aliases: [changepwd, changepass]
  auth:
    description: "Administration des comptes : reset / info / unlock / delete / kick"
    permission: smp.admin
  npc:
    description: "PNJ d'ambiance : create / remove / list / skin / wander / tp / here / rename"
    aliases: [npcs, pnj]
    permission: smp.admin
  holo:
    description: "Hologrammes TextDisplay : create / remove / list / lines / addline / setline / delline / tp / here"
    aliases: [hologram, holograms, hd]
    permission: smp.admin
  admin:
    description: "Toggle entre une poche admin (creative + fly, inv séparé) et ta poche joueur"
    aliases: [adminmode, am]
    permission: smp.admin
  god:
    description: "Toggle god mode (invincibilité)"
    aliases: [godmode, tgm]
    permission: smp.admin
  heal:
    description: "Soigne complètement un joueur (vie + faim + effets)"
    aliases: [healme]
    permission: smp.admin
  fly:
    description: "Toggle le vol pour un joueur"
    aliases: [flymode]
    permission: smp.admin
  speed:
    description: "Définit la vitesse de marche/vol (0-10)"
    aliases: [speedset, fspeed]
    permission: smp.admin
  furnace:
    description: "Cuit instantanément l'item en main"
    aliases: [smelt, cook]
    permission: smp.admin
  send:
    description: "Envoyer des joueurs vers un autre serveur (send <joueur> | all | allhere | server | me)"
    aliases: [transfer]
    permission: smp.admin
  infoadmin:
    description: "Affiche toutes les infos admin sur un joueur (IP, ban, mute, historique, etc.)"
    aliases: [ia, whois]
    permission: smp.admin
  chat:
    description: "Verrouille ou déverrouille le chat global"
    aliases: [chatlevel, chaton, chatoff]
    permission: smp.moderation
  invrollback:
    description: "Historique d'inventaires : list / peek / apply / snap"
    aliases: [invroll, invhistory, invhist]
    permission: smp.admin
  repair:
    description: "Repair item durability: hand, player hand, or all"
    aliases: [fix, fixall]
    permission: smp.admin
  rename:
    description: "Renomme l'item en main (MiniMessage). Sans argument = reset."
    aliases: [renommer]
  nick:
    description: "Définir ou supprimer ton surnom affiché"
    aliases: [nickname]
  link:
    description: "Lier ton compte Discord à Minecraft"
    aliases: [discordlink]

permissions:
  smp.admin:
    description: "Admin permissions"
    default: op
  smp.rtp.bypass:
    description: "Bypass RTP cooldown"
    default: op
  smp.sync.bypass:
    description: "Bypass cross-server inventory sync"
    default: false
  smp.homes.5:
    default: true
  smp.homes.10:
    default: false
  smp.homes.15:
    default: false
  smp.homes.20:
    default: op
  smp.chat.color:
    description: "Use color codes in chat (&a, &#rrggbb)"
    default: true
  smp.chat.format:
    description: "Use formatting codes (&l bold, &n underline, etc.)"
    default: op
  smp.chat.antispam.bypass:
    description: "Ignore the auto anti-spam (rate-limit + duplicate flood)"
    default: op
  smp.chat.bypass-lock:
    description: "Parler même quand le chat est verrouillé"
    default: op
  smp.perm.manage:
    description: "Manage the permissions system"
    default: op
  smp.op:
    description: "Use /op and /deop"
    default: op
  smp.moderation:
    description: "Use /kick /ban /unban /mute /unmute"
    default: op
  smp.vanish:
    description: "Use /vanish"
    default: op
  smp.vanish.see:
    description: "See other vanished staff even when hidden"
    default: op
  smp.fullbright:
    description: "Use /fullbright"
    default: true
