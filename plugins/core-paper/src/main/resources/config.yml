# =========================================
#  SMPCore — Global configuration
# =========================================

# Server type: "lobby" or "survival"
server-type: "lobby"

# Discord bridge — WebSocket client to the companion Discord bot.
# Must match the bot's BRIDGE_TOKEN; url points at BRIDGE_HOST:BRIDGE_PORT.
discord-bridge:
  enabled: false
  url: "ws://127.0.0.1:8787"
  token: ""
  # origin defaults to server-type if omitted. Override for multi-instance setups.
  # origin: "survival"
  telemetry-interval-ticks: 40

# Storage (SQLite). Relative to server working dir.
storage:
  directory: "../shared-data"

# Server selector menu
menu:
  title: "<gradient:#67e8f9:#a78bfa><bold>Serveurs</bold></gradient>"
  items:
    lobby:
      slot: 11
      material: NETHER_STAR
      name: "<gradient:#a8edea:#fed6e3>Lobby</gradient>"
      lore:
        - ""
        - "<gray>Le hub principal</gray>"
        - ""
        - "<gray>Joueurs: <green>%players%</green></gray>"
        - ""
        - "<yellow>▶ Clic pour rejoindre</yellow>"
    survival:
      slot: 15
      material: GRASS_BLOCK
      name: "<gradient:#84fab0:#8fd3f4>Survie</gradient>"
      lore:
        - ""
        - "<gray>Le monde survie principal</gray>"
        - ""
        - "<gray>Joueurs: <green>%players%</green></gray>"
        - ""
        - "<yellow>▶ Clic pour rejoindre</yellow>"

# Chat (MiniMessage). Available placeholders:
#   %rank%    -> group prefix from the permissions system (e.g. "<red>[Admin]</red> ")
#   %hunted%  -> "[CHASSÉ • $xK]" tag if the player is the hunted of the day
#   %tag%     -> team tag if the player is in a team
#   %player%  -> player name
# The message itself is rendered by the plugin, not via placeholder.
chat:
  enabled: true
  format: "%rank%%hunted%%tag%<gray>%player%</gray> <dark_gray>»</dark_gray> "
  # ------ Anti-spam automatique ------
  # Cancel le message, auto-mute le joueur et alerte les admins (smp.moderation).
  # Bypass: donner la permission smp.chat.antispam.bypass.
  antispam:
    enabled: true
    fresh-join:
      enabled: true
      block-seconds: 6        # Fresh connections cannot speak immediately.
      max-attempts: 2         # Repeated attempts during the block => mute + kick.
      mute-duration: "30m"
      kick-message: "<red>Connexion refusée.</red>"
    rate-limit:
      messages: 3            # Si > messages envoyés en window-seconds → mute.
      window-seconds: 3
    duplicate:
      threshold: 2           # Si > N messages identiques à la suite → mute.
    mute-duration: "10m"     # Format: 1d2h30m / 10m / perm
    advert-mute-duration: "1h" # Mute pour pub de cheat client (leetspeak + domaine/nom)
    advert-kick-message: "<red>Pub interdite.</red>"  # Kick en plus du mute — on ne garde pas un bot pub.
    payload-mute-duration: "1d" # ${jndi:...}, ldap://, rmi://, etc.
    payload-kick-message: "<red>Connexion refusée.</red>"
    # ------ Anti-bot "compte neuf" ------
    # Un compte cracked fraîchement inscrit doit avoir un minimum d'ancienneté
    # ET de preuves de présence humaine (mouvement, clic, casse/pose) avant que
    # son chat ne soit visible. Bloque les bots qui /register puis spam instantané.
    # Pas de ban ni de mute — le message est juste silencieusement annulé avec
    # un rappel action-bar. Les joueurs premium et les comptes existants ne sont
    # pas concernés.
    new-account:
      min-age-ms: 120000      # 2 min d'ancienneté du compte requises pour parler
      min-interactions: 5     # 5 interactions (déplacement inter-bloc, clic, break/place)

# Spawn (survival)
spawn:
  world: "world"
  x: 0.5
  y: 100.0
  z: 0.5
  yaw: 0.0
  pitch: 0.0

# Hub spawn (lobby)
hub-spawn:
  world: "world"
  x: 0.5
  y: 100.0
  z: 0.5
  yaw: 0.0
  pitch: 0.0

# Cross-server player data sync (inventory, enderchest, xp, food, effects)
sync:
  enabled: true
  directory: "../shared-data/players"
  # Rolling inventory history → /invrollback list|peek|apply|snap <joueur>
  # Only active on non-lobby servers. Stored in the shared SQLite (inv_snapshots).
  history:
    enabled: true
    interval-minutes: 5       # auto-snapshot cadence for every online player
    keep-per-player: 50       # retention cap; older snapshots are pruned

# ------ RTP ------
rtp:
  on-join: false              # Teleport players randomly each join (default: first-join only)
  cooldown-seconds: 600       # 10 min
  min-distance: 500
  max-attempts: 16
  default-world: "world"
  world-overworld: "world"
  world-nether: "world_nether"
  world-end: "world_the_end"
  radius:                     # Override per-world (defaults to border/2 - 50)
    # world: 8000
    # world_nether: 3000

# ------ Worldborder ------
worldborder:
  world:
    size: 20000
    center: { x: 0.0, z: 0.0 }
  world_nether:
    size: 5000
    center: { x: 0.0, z: 0.0 }
  world_the_end:
    size: 10000
    center: { x: 0.0, z: 0.0 }

# ------ Combat tag ------
combat:
  duration-seconds: 15

# ------ TPA ------
tpa:
  ttl-seconds: 60

# ------ Homes ------
homes:
  base-slots: 5               # default max homes (override via smp.homes.<N>)
  max-slots: 5                # hard cap, matches the single-row Homes GUI

# ------ Cooldowns (seconds) ------
# Bypass: smp.cooldown.bypass.<key> or smp.cooldown.bypass.*
cooldowns:
  home: 10
  tpa: 10
  tpaccept: 10
  pay: 5

# ------ Machine boosts ------
# Survival automation is intentionally fast: crafters burst multiple crafts
# from one trigger, and cooking blocks process recipes almost instantly.
machines:
  enabled: true
  crafters:
    enabled: true
    crafts-per-pulse: 16
    ticks-between-crafts: 1
    require-power: false
  dispensers:
    enabled: true
    actions-per-pulse: 16
    ticks-between-actions: 1
    require-power: false
  furnaces:
    enabled: true
    cook-speed-multiplier: 200.0
    fuel-time-multiplier: 64.0

# ------ Teams ------
teams:
  creation-cost: 500
  max-members: 4

# ------ Economy ------
economy:
  shards-per-minute: 1
  starting-balance: 0

# ------ Auction House ------
auction:
  ttl-hours: 48
  max-per-player: 25
  fee-percent: 5.0

# ------ Bounty ------
bounty:
  min-amount: 1000000        # Minimum added per bounty contribution (1M)
  max-amount: 100000000000   # Maximum added per single contribution (100B)

# ------ Chassé du jour ------
# Le joueur avec le plus de kills quotidiens reçoit un statut visible
# (glow rouge, tag [CHASSÉ], traces de sang, aura). Une prime automatique
# est placée sur lui au moment où il devient chassé — une seule fois par
# journée. Reset à minuit heure serveur.
hunted:
  enabled: true
  min-kills: 5           # kills quotidiens requis pour devenir chassé
  bounty-amount: 100000  # prime auto placée à la 1ère désignation du jour

# ------ Keyall (global crate countdown) ------
keyall:
  interval-minutes: 60

# ------ World toggles ------
world:
  end-enabled: true           # /end on|off|toggle (admin only)
  phantoms-enabled: true      # /phantom on|off|toggle (admin only)
  disable-locator-bar: true   # try to disable the vanilla locator bar HUD (gamerule if available)

# ------ Weather ------
weather:
  # Worlds on which rain/thunder is permanently suppressed.
  no-rain-worlds:
    - "world"                 # lobby world always clear

# ------ AFK detection (feeds /playtime) ------
afk:
  inactive-seconds: 120         # no-movement / head-still seconds before flagging AFK

# ------ Custom enchants ------
# Enchants custom + over-cap de vanilla (Eff VI, Unb IV, Prot VI, Sharp VI, Fort IV).
# Les livres s'appliquent à l'enclume sur un objet compatible. Les drops custom
# se cumulent avec vanilla via PDC — les drops overcap sont des enchantements
# vanilla appliqués à un niveau supérieur au cap normal.
customenchants:
  table:
    custom-chance-at-30: 0.08
    overcap-chance-at-30: 0.03
  mob-drop:
    enabled: true
    chance: 0.005
    overcap-ratio: 0.10
  anvil:
    book-cost: 6
    elytra-fusion-cost: 15

enchant-pricing:
  enabled: true
  vanilla:
    PROTECTION: 30
    FIRE_PROTECTION: 25
    FEATHER_FALLING: 20
    BLAST_PROTECTION: 25
    PROJECTILE_PROTECTION: 25
    RESPIRATION: 20
    AQUA_AFFINITY: 50
    THORNS: 15
    DEPTH_STRIDER: 25
    FROST_WALKER: 40
    SOUL_SPEED: 60
    SWIFT_SNEAK: 60
    SHARPNESS: 35
    SMITE: 25
    BANE_OF_ARTHROPODS: 25
    KNOCKBACK: 20
    FIRE_ASPECT: 30
    LOOTING: 40
    SWEEPING_EDGE: 25
    EFFICIENCY: 30
    SILK_TOUCH: 80
    UNBREAKING: 25
    FORTUNE: 45
    POWER: 30
    FLAME: 50
    PUNCH: 20
    INFINITY: 100
    LUCK_OF_THE_SEA: 35
    LURE: 30
    LOYALTY: 25
    IMPALING: 25
    RIPTIDE: 35
    CHANNELING: 60
    MULTISHOT: 50
    QUICK_CHARGE: 30
    PIERCING: 25
    MENDING: 120
    BINDING_CURSE: 0
    VANISHING_CURSE: 0
    WIND_BURST: 50
    DENSITY: 30
    BREACH: 40
  custom:
    filonage: 500
    carriere: 400
    bucheron: 450
    excavateur: 350
    moisson: 300
    replantage: 200
    fonte: 350
    aimant: 250
    vitalite: 300
    ame_liee: 800

# ------ Resource packs ------
# Envoie tous les packs configurés au joueur à l'entrée sur la survie, et
# les retire quand il quitte. Chaque entrée est un slot libre (nom au choix :
# sparkles, stellarity, ...). Le sha1 est le hash SHA-1 hexadécimal (40 chars)
# du fichier zip — obtenable avec `sha1sum pack.zip` ou
# `Get-FileHash -Algorithm SHA1 pack.zip`.
#
# Laisser url/sha1 vides désactive le slot correspondant.
resource-packs:
  enabled: true
  sparkles:
    url: ""
    sha1: ""
    required: false
    prompt: "<yellow>Pack Sparkles recommandé (textures Incendium)</yellow>"
  stellarity:
    url: ""
    sha1: ""
    required: true
    prompt: "<yellow>Pack Stellarity requis</yellow>"

# ------ Scoreboard ------
scoreboard:
  title: "<gradient:#67e8f9:#a78bfa><bold>SaphirSMP</bold></gradient>"
  # Leave empty to use defaults. Placeholders:
  #  %money% %shards% %kills% %deaths% %keyall% %playtime% %team% %ping%
  lines: []
