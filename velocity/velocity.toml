# Velocity Configuration
# Generated for SMP Network

# Bind address and port for the proxy
bind = "0.0.0.0:25565"

# MOTD shown in the server list (MiniMessage format)
motd = "<gradient:#a8edea:#fed6e3>✦ SMP ✦</gradient>"

# Maximum number of players shown in the server list
show-max-players = 60

# Whether to authenticate players with Mojang (online mode)
online-mode = true

# Prevent client proxies/VPNs (requires online-mode = true)
prevent-client-proxy-connections = false

# Player info forwarding mode
# "none"   - No forwarding (BungeeCord-style IP spoofing disabled)
# "legacy" - BungeeCord-compatible forwarding
# "bungeeguard" - BungeeCord + BungeeGuard token
# "modern" - Velocity modern forwarding (Paper/Folia compatible, recommended)
player-info-forwarding-mode = "modern"

# Kick existing player when a new player with the same name connects
kick-existing-players = false

# Announce forge on the ping response
announce-forge = false

# Enable the built-in Velocity command /server, /velocity, etc.
# Requires operator permissions
announce-proxy-commands = true

# Log command executions
log-command-executions = false

# Log player connections
log-player-connections = true

[servers]
# Backend server definitions
lobby    = "127.0.0.1:25566"
survival = "127.0.0.1:25567"

# The order servers are tried when a player first joins.
# Players will land in "lobby" by default.
try = [
    "lobby"
]

[forced-hosts]
# Route specific hostnames to specific servers, e.g.:
# "survival.yourdomain.com" = ["survival"]

[advanced]
# Size of the compression threshold (bytes). -1 disables compression.
compression-threshold = 256

# Level of compression (0 = none, 9 = max). -1 uses Java default.
compression-level = -1

# Timeout (ms) for a player to complete the login process.
login-ratelimit = 3000

# Connection timeout to backend servers (ms).
connection-timeout = 5000

# Read timeout from backend servers (ms).
read-timeout = 30000

# Enable proxy protocol support (for HAProxy etc.)
proxy-protocol = false

# Show ping requests in the log
show-ping-requests = false

# Fail on forwarding secret mismatch (recommended true)
failover-on-unexpected-server-disconnect = true

# Enables BungeeCord plugin messaging channel support
bungee-plugin-message-channel = true

# Enable TCP fast open (Linux only)
tcp-fast-open = false

# Enable Velocity's built-in query protocol
enable-player-address-logging = true

[query]
# Enable GameSpy4 query protocol
enabled = false
port = 25565
map = "SMP"
show-plugins = false
